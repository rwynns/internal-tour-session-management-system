services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tour_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=local
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tour_network

  nginx:
    image: nginx:1.27-alpine
    container_name: tour_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tour_network

  mysql:
    image: mysql:8.0
    container_name: tour_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_DATABASE: "${DB_DATABASE:-tour_session}"
      MYSQL_USER: "${DB_USERNAME:-tour_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tour_network

networks:
  tour_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
